services:
  - type: web
    name: fic
    runtime: docker
    repo: https://github.com/kitycat1324/Fic.git
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
